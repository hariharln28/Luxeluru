services:
  - type: web
    name: luxeluru
    runtime: node
    buildCommand: npm install --production=false && cd server && npm install && npm rebuild sqlite3 --build-from-source && cd .. && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
