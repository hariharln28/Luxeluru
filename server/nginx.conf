# Luxeluru Nginx Reverse Proxy Configuration
# Place this in your Nginx config directory or run Nginx pointing to this configuration.

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Enable gzip compression for fast loads on mobile
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    upstream luxeluru_backend {
        server 127.0.0.1:5000;
    }

    server {
        listen       80;
        server_name  localhost;

        # Redirect all HTTP requests to the Node Express server
        location / {
            proxy_pass http://luxeluru_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Forward real client IPs to backend for location analytics
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Custom error page
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }
    }
}
